name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # updated

    - name: Set up Python
      uses: actions/setup-python@v5   # updated
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Train model
      run: |
        python model/train.py

    - name: Set PYTHONPATH  ✅ IMPORTANT
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Run tests
      run: |
        pytest

    - name: Build Docker Image
      run: |
        docker build -t ml-cicd-app .
